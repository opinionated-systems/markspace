<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 64" width="680" height="64" font-family="'IBM Plex Mono', monospace">
  <style>
    .fg { fill: #1a1a2e; }
    .fg-stroke { stroke: #1a1a2e; }
    .arr-fill { fill: #1a1a2e; }
    .accent { fill: #c23616; }
    .accent-stroke { stroke: #c23616; }
    .arr-accent { fill: #c23616; }
    @media (prefers-color-scheme: dark) {
      .fg { fill: #d4d4dc; }
      .fg-stroke { stroke: #d4d4dc; }
      .arr-fill { fill: #d4d4dc; }
      .accent { fill: #e8664a; }
      .accent-stroke { stroke: #e8664a; }
      .arr-accent { fill: #e8664a; }
    }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arr-fill"/>
    </marker>
    <marker id="arr-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arr-accent"/>
    </marker>
  </defs>

  <!-- Sensor -->
  <rect x="5" y="20" width="110" height="36" rx="4" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="60" y="43" font-size="11" font-weight="500" class="fg" text-anchor="middle">Sensor</text>

  <!-- Arrow: Sensor -> Filter -->
  <line x1="119" y1="38" x2="187" y2="38" class="fg-stroke" stroke-width="1" marker-end="url(#arr)"/>
  <text x="153" y="30" font-size="8" class="fg" opacity="0.5" text-anchor="middle">observation</text>

  <!-- Filter -->
  <rect x="191" y="20" width="110" height="36" rx="4" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="246" y="43" font-size="11" font-weight="500" class="fg" text-anchor="middle">Filter</text>

  <!-- Arrow: Filter -> Aggregator -->
  <line x1="305" y1="38" x2="373" y2="38" class="fg-stroke" stroke-width="1" marker-end="url(#arr)"/>
  <text x="339" y="30" font-size="8" class="fg" opacity="0.5" text-anchor="middle">observation</text>

  <!-- Aggregator -->
  <rect x="377" y="20" width="110" height="36" rx="4" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="432" y="43" font-size="11" font-weight="500" class="fg" text-anchor="middle">Aggregator</text>

  <!-- Arrow: Aggregator -> Actor -->
  <line x1="491" y1="38" x2="559" y2="38" class="accent-stroke" stroke-width="1" marker-end="url(#arr-accent)"/>
  <text x="525" y="30" font-size="8" class="accent" opacity="0.6" text-anchor="middle">warning</text>

  <!-- Actor -->
  <rect x="563" y="20" width="110" height="36" rx="4" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="618" y="43" font-size="11" font-weight="500" class="fg" text-anchor="middle">Actor</text>

</svg>
