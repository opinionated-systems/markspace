<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="900" height="425" font-family="'IBM Plex Mono', monospace">
  <style>
    .fg { fill: #1a1a2e; }
    .fg-stroke { stroke: #1a1a2e; }
    .bg-fill { fill: #1a1a2e; }
    .arr-fill { fill: #1a1a2e; }
    @media (prefers-color-scheme: dark) {
      .fg { fill: #d4d4dc; }
      .fg-stroke { stroke: #d4d4dc; }
      .bg-fill { fill: #d4d4dc; }
      .arr-fill { fill: #d4d4dc; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arr-fill"/>
    </marker>
  </defs>

  <!-- Committee Model (left) -->
  <text x="160" y="24" font-size="13" font-weight="500" class="fg" text-anchor="middle">COMMITTEE MODEL</text>

  <circle cx="80"  cy="80"  r="22" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="80"  y="85" font-size="11" class="fg" text-anchor="middle">A</text>
  <circle cx="240" cy="80"  r="22" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="240" y="85" font-size="11" class="fg" text-anchor="middle">B</text>
  <circle cx="80"  cy="170" r="22" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="80"  y="175" font-size="11" class="fg" text-anchor="middle">C</text>
  <circle cx="240" cy="170" r="22" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="240" y="175" font-size="11" class="fg" text-anchor="middle">D</text>
  <circle cx="80"  cy="260" r="22" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="80"  y="265" font-size="11" class="fg" text-anchor="middle">E</text>
  <circle cx="240" cy="260" r="22" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="240" y="265" font-size="11" class="fg" text-anchor="middle">F</text>

  <line x1="102" y1="80" x2="218" y2="80" class="fg-stroke" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="102" x2="80" y2="148" class="fg-stroke" stroke-width="1" opacity="0.3"/>
  <line x1="240" y1="102" x2="240" y2="148" class="fg-stroke" stroke-width="1" opacity="0.3"/>
  <line x1="102" y1="170" x2="218" y2="170" class="fg-stroke" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="192" x2="80" y2="238" class="fg-stroke" stroke-width="1" opacity="0.3"/>
  <line x1="240" y1="192" x2="240" y2="238" class="fg-stroke" stroke-width="1" opacity="0.3"/>
  <line x1="102" y1="260" x2="218" y2="260" class="fg-stroke" stroke-width="1" opacity="0.3"/>
  <line x1="97" y1="95" x2="223" y2="155" class="fg-stroke" stroke-width="1" opacity="0.3"/>
  <line x1="223" y1="95" x2="97" y2="155" class="fg-stroke" stroke-width="1" opacity="0.3"/>
  <line x1="97" y1="185" x2="223" y2="245" class="fg-stroke" stroke-width="1" opacity="0.3"/>
  <line x1="223" y1="185" x2="97" y2="245" class="fg-stroke" stroke-width="1" opacity="0.3"/>
  <line x1="97" y1="93" x2="223" y2="247" class="fg-stroke" stroke-width="1" opacity="0.15"/>
  <line x1="223" y1="93" x2="97" y2="247" class="fg-stroke" stroke-width="1" opacity="0.15"/>

  <text x="160" y="310" font-size="11" class="fg" text-anchor="middle" opacity="0.6">O(N²) channels</text>
  <text x="160" y="328" font-size="11" class="fg" text-anchor="middle" opacity="0.6">Every agent knows every other</text>

  <line x1="340" y1="20" x2="340" y2="330" class="fg-stroke" stroke-width="1" opacity="0.12"/>

  <!-- Stigmergic Model (right) -->
  <text x="530" y="24" font-size="13" font-weight="500" class="fg" text-anchor="middle">STIGMERGIC MODEL</text>

  <circle cx="430" cy="70"  r="22" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="430" y="75" font-size="11" class="fg" text-anchor="middle">A</text>
  <circle cx="630" cy="70"  r="22" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="630" y="75" font-size="11" class="fg" text-anchor="middle">B</text>
  <circle cx="430" cy="260" r="22" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="430" y="265" font-size="11" class="fg" text-anchor="middle">C</text>
  <circle cx="630" cy="260" r="22" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="630" y="265" font-size="11" class="fg" text-anchor="middle">D</text>

  <rect x="380" y="130" width="300" height="80" rx="4" class="bg-fill fg-stroke" fill-opacity="0.06" stroke-width="1.5"/>
  <text x="530" y="162" font-size="12" font-weight="500" class="fg" text-anchor="middle">SHARED MARK SPACE</text>
  <text x="530" y="180" font-size="10" class="fg" text-anchor="middle" opacity="0.5">intents, actions, warnings, observations, needs</text>

  <line x1="430" y1="92" x2="430" y2="130" class="fg-stroke" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="130" x2="440" y2="92" class="fg-stroke" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="630" y1="92" x2="630" y2="130" class="fg-stroke" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="130" x2="620" y2="92" class="fg-stroke" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="238" x2="430" y2="210" class="fg-stroke" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="210" x2="440" y2="238" class="fg-stroke" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="630" y1="238" x2="630" y2="210" class="fg-stroke" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="210" x2="620" y2="238" class="fg-stroke" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="530" y="310" font-size="11" class="fg" text-anchor="middle" opacity="0.6">O(N) channels</text>
  <text x="530" y="328" font-size="11" class="fg" text-anchor="middle" opacity="0.6">No agent knows any other</text>
</svg>
