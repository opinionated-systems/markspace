<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" width="700" height="375" font-family="'IBM Plex Mono', monospace">
  <style>
    .fg { fill: #1a1a2e; }
    .fg-stroke { stroke: #1a1a2e; }
    .bg { fill: #1a1a2e; }
    .accent { fill: #c23616; }
    .accent-stroke { stroke: #c23616; }
    .arr-fill { fill: #1a1a2e; }
    .arr-accent { fill: #c23616; }
    @media (prefers-color-scheme: dark) {
      .fg { fill: #d4d4dc; }
      .fg-stroke { stroke: #d4d4dc; }
      .bg { fill: #d4d4dc; }
      .accent { fill: #e8664a; }
      .accent-stroke { stroke: #e8664a; }
      .arr-fill { fill: #d4d4dc; }
      .arr-accent { fill: #e8664a; }
    }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arr-fill"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arr-accent"/>
    </marker>
  </defs>

  <text x="280" y="20" font-size="13" font-weight="500" class="fg" text-anchor="middle">SINGLE AGENT</text>

  <!-- Authority (outermost ring) -->
  <rect x="40" y="30" width="480" height="170" rx="8" class="bg" opacity="0.03"/>
  <rect x="40" y="30" width="480" height="170" rx="8" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="54" y="52" font-size="11" font-weight="500" class="fg">Authority</text>
  <text x="54" y="66" font-size="8" class="fg" opacity="0.4">scope authorization, mark permissions, budget</text>

  <!-- Validation (middle ring) -->
  <rect x="66" y="76" width="428" height="96" rx="6" class="bg" opacity="0.05"/>
  <rect x="66" y="76" width="428" height="96" rx="6" fill="none" class="fg-stroke" stroke-width="1"/>
  <text x="80" y="96" font-size="11" font-weight="500" class="fg">Validation</text>
  <text x="80" y="110" font-size="8" class="fg" opacity="0.4">schema checks, scope constraints, idempotent retry</text>

  <!-- Mark Read/Write (core) -->
  <rect x="96" y="120" width="368" height="36" rx="4" class="bg" opacity="0.08"/>
  <rect x="96" y="120" width="368" height="36" rx="4" fill="none" class="fg-stroke" stroke-width="1.5"/>
  <text x="280" y="142" font-size="11" font-weight="500" class="fg" text-anchor="middle">Mark Read/Write</text>

  <!-- Self-monitoring (bottom left) -->
  <rect x="40" y="238" width="200" height="50" rx="4" class="bg" opacity="0.05"/>
  <rect x="40" y="238" width="200" height="50" rx="4" fill="none" class="fg-stroke" stroke-width="1"/>
  <text x="140" y="260" font-size="10" font-weight="500" class="fg" text-anchor="middle">Self-monitoring</text>
  <text x="140" y="276" font-size="8" class="fg" opacity="0.4" text-anchor="middle">rate anomaly, peer-agreement drift</text>

  <!-- Self-restriction (bottom right) -->
  <rect x="320" y="238" width="200" height="50" rx="4" class="accent" opacity="0.06"/>
  <rect x="320" y="238" width="200" height="50" rx="4" fill="none" class="accent-stroke" stroke-width="1" opacity="0.4"/>
  <text x="420" y="260" font-size="10" font-weight="500" class="accent" text-anchor="middle">Self-restriction</text>
  <text x="420" y="276" font-size="8" class="accent" opacity="0.5" text-anchor="middle">narrow scope, write NEED</text>

  <!-- Feedback loop arrows -->

  <!-- Down: authority → self-monitoring -->
  <line x1="140" y1="200" x2="140" y2="232" class="fg-stroke" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="154" y="220" font-size="8" class="fg" opacity="0.5">observe</text>

  <!-- Right: self-monitoring → self-restriction -->
  <line x1="240" y1="263" x2="314" y2="263" class="accent-stroke" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="264" y="256" font-size="8" class="accent" opacity="0.7">anomaly</text>

  <!-- Up: self-restriction → authority -->
  <line x1="420" y1="238" x2="420" y2="206" class="accent-stroke" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="434" y="222" font-size="8" class="accent" opacity="0.5">narrow scope</text>
</svg>
