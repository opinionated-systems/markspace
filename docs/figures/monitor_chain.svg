<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 88" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#999"/>
    </marker>
  </defs>

  <!-- BookingAgent -->
  <rect x="16" y="20" width="120" height="44" rx="7" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.2"/>
  <text x="76" y="47" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">BookingAgent</text>

  <!-- w -> action mark -->
  <line x1="136" y1="42" x2="168" y2="42" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="152" y="37" text-anchor="middle" font-size="7" font-weight="600" fill="#999">w</text>

  <!-- action mark node (square) -->
  <rect x="172" y="30" width="24" height="24" rx="3" fill="#2ecc71" opacity="0.15" stroke="#2ecc71" stroke-width="1"/>
  <rect x="180" y="38" width="8" height="8" rx="1" fill="#2ecc71" opacity="0.5"/>
  <text x="184" y="22" text-anchor="middle" font-size="7" fill="#27ae60">action</text>
  <text x="184" y="66" text-anchor="middle" font-size="7" fill="#aaa" font-style="italic">booked</text>

  <!-- r -> AuditAgent -->
  <line x1="200" y1="42" x2="228" y2="42" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="214" y="37" text-anchor="middle" font-size="7" font-weight="600" fill="#999">r</text>

  <!-- AuditAgent -->
  <rect x="232" y="20" width="120" height="44" rx="7" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.2"/>
  <text x="292" y="47" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">AuditAgent</text>

  <!-- w -> warning mark -->
  <line x1="352" y1="42" x2="384" y2="42" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="368" y="37" text-anchor="middle" font-size="7" font-weight="600" fill="#999">w</text>

  <!-- warning mark node (triangle, centered on y=42) -->
  <polygon points="400,26 416,54 384,54" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="1"/>
  <polygon points="400,37 406,48 394,48" fill="#e74c3c" opacity="0.4"/>
  <text x="400" y="18" text-anchor="middle" font-size="7" fill="#c0392b">warning</text>
  <text x="400" y="68" text-anchor="middle" font-size="7" fill="#aaa" font-style="italic">policy_violation</text>

  <!-- r -> ... -->
  <line x1="416" y1="42" x2="448" y2="42" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="432" y="37" text-anchor="middle" font-size="7" font-weight="600" fill="#999">r</text>
  <text x="468" y="47" text-anchor="middle" font-size="18" fill="#ccc">...</text>
</svg>
