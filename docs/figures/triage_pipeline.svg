<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 128" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#999"/>
    </marker>
  </defs>

  <!-- ticket-triager -->
  <rect x="16" y="36" width="120" height="44" rx="7" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.2"/>
  <text x="76" y="54" text-anchor="middle" font-size="10" font-weight="600" fill="#2c3e50">ticket-triager</text>
  <text x="76" y="66" text-anchor="middle" font-size="7" fill="#888">reads tickets</text>

  <!-- w -> obs mark -->
  <line x1="136" y1="58" x2="163" y2="58" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="150" y="53" text-anchor="middle" font-size="7" font-weight="600" fill="#999">w</text>

  <!-- observation mark: pattern -->
  <circle cx="179" cy="58" r="12" fill="#4a90d9" opacity="0.15" stroke="#4a90d9" stroke-width="1"/>
  <circle cx="179" cy="58" r="4" fill="#4a90d9" opacity="0.5"/>
  <text x="179" y="41" text-anchor="middle" font-size="7" fill="#4a90d9">observation</text>
  <text x="179" y="80" text-anchor="middle" font-size="7" fill="#aaa" font-style="italic">"pattern"</text>

  <!-- r -> incident-assessor -->
  <line x1="191" y1="58" x2="218" y2="58" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="205" y="53" text-anchor="middle" font-size="7" font-weight="600" fill="#999">r</text>

  <!-- incident-assessor -->
  <rect x="222" y="36" width="140" height="44" rx="7" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.2"/>
  <text x="292" y="54" text-anchor="middle" font-size="10" font-weight="600" fill="#2c3e50">incident-assessor</text>
  <text x="292" y="66" text-anchor="middle" font-size="7" fill="#888">judges severity</text>

  <!-- w -> obs mark -->
  <line x1="362" y1="58" x2="389" y2="58" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="376" y="53" text-anchor="middle" font-size="7" font-weight="600" fill="#999">w</text>

  <!-- observation mark: assessment -->
  <circle cx="405" cy="58" r="12" fill="#4a90d9" opacity="0.15" stroke="#4a90d9" stroke-width="1"/>
  <circle cx="405" cy="58" r="4" fill="#4a90d9" opacity="0.5"/>
  <text x="405" y="41" text-anchor="middle" font-size="7" fill="#4a90d9">observation</text>
  <text x="405" y="80" text-anchor="middle" font-size="7" fill="#aaa" font-style="italic">"assessment"</text>

  <!-- r -> escalation-agent -->
  <line x1="417" y1="58" x2="444" y2="58" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="431" y="53" text-anchor="middle" font-size="7" font-weight="600" fill="#999">r</text>

  <!-- escalation-agent -->
  <rect x="448" y="36" width="140" height="44" rx="7" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.2"/>
  <text x="518" y="54" text-anchor="middle" font-size="10" font-weight="600" fill="#2c3e50">escalation-agent</text>
  <text x="518" y="66" text-anchor="middle" font-size="7" fill="#888">page or escalate</text>

  <!-- action branch: upper row at y=24 -->
  <line x1="588" y1="48" x2="588" y2="24" stroke="#888" stroke-width="1"/>
  <line x1="588" y1="24" x2="615" y2="24" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="602" y="19" text-anchor="middle" font-size="7" font-weight="600" fill="#999">w</text>

  <!-- action mark: paged -->
  <rect x="620" y="12" width="24" height="24" rx="3" fill="#2ecc71" opacity="0.15" stroke="#2ecc71" stroke-width="1"/>
  <rect x="628" y="20" width="8" height="8" rx="1" fill="#2ecc71" opacity="0.5"/>
  <text x="632" y="8" text-anchor="middle" font-size="7" fill="#27ae60">action</text>

  <!-- -> page output -->
  <line x1="644" y1="24" x2="666" y2="24" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="680" y="27" font-size="9" fill="#2c3e50">page</text>

  <!-- need branch: lower row at y=92 -->
  <line x1="588" y1="68" x2="588" y2="92" stroke="#9467bd" stroke-width="1"/>
  <line x1="588" y1="92" x2="615" y2="92" stroke="#9467bd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="602" y="87" text-anchor="middle" font-size="7" font-weight="600" fill="#9467bd">w</text>

  <!-- need mark: principal -->
  <polygon points="632,78 644,92 632,106 620,92" fill="#9467bd" opacity="0.15" stroke="#9467bd" stroke-width="1"/>
  <polygon points="632,85 637,92 632,99 627,92" fill="#9467bd" opacity="0.5"/>
  <text x="632" y="118" text-anchor="middle" font-size="7" fill="#9467bd">need</text>

  <!-- -> principal output -->
  <line x1="644" y1="92" x2="666" y2="92" stroke="#9467bd" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="680" y="95" font-size="9" fill="#9467bd">principal</text>

  <!-- Scope labels -->
  <text x="76" y="98" text-anchor="middle" font-size="7" fill="#bbb" font-style="italic">scope: support-triage</text>
  <text x="292" y="98" text-anchor="middle" font-size="7" fill="#bbb" font-style="italic">scope: incidents</text>
  <text x="518" y="98" text-anchor="middle" font-size="7" fill="#bbb" font-style="italic">scope: oncall</text>

  <!-- Decay -->
  <text x="76" y="109" text-anchor="middle" font-size="6" fill="#ccc">t<tspan font-size="4" baseline-shift="sub">1/2</tspan> = 4h</text>
  <text x="292" y="109" text-anchor="middle" font-size="6" fill="#ccc">t<tspan font-size="4" baseline-shift="sub">1/2</tspan> = 6h</text>
  <text x="518" y="109" text-anchor="middle" font-size="6" fill="#ccc">t<tspan font-size="4" baseline-shift="sub">1/2</tspan> = 1h</text>
</svg>
